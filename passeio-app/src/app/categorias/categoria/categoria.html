<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
  <h2 class="text-2xl font-semibold text-gray-800">Nova Categoria</h2>
  <hr />

  <form action="" id="categoriaForm" [formGroup]="camposForm" (ngSubmit)="salvar()">
    <div class="mb-4">
      <label for="nome" class="block text-gray-600 font-medium mb-2">Nome</label>
      <input
        type="text"
        id="nome"
        name="nome"
        class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
        placeholder="Restaurantes, Lazer, etc."
        required
        formControlName="nome"
      />
      <span class="text-red-500 text-sm">Campo Obrigatório</span>
    </div>

    <div class="mb-4">
      <label for="descricao" class="block text-gray-600 font-medium mb-2">Descrição</label>
      <textarea
        rows="4"
        id="descricao"
        name="descricao"
        class="w-full p-3 border border-gray-300 rounded shadow-sm focus:outline-none focus:ring focus:ring-blue-400"
        required
        formControlName="descricao"
      ></textarea>
      <span class="text-red-500 text-sm">Campo Obrigatório</span>
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded shadow"
    >
      Cadastrar Categoria
    </button>
  </form>
</div>
