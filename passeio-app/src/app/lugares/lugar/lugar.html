<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
  <h2 class="text-2xl font-semibold text-gray-800">Novo Lugar</h2>
  <hr />

  <form action="" id="lugarForm" [formGroup]="camposForm" (ngSubmit)="salvar()">
    <div class="mb-4">
      <label for="nome" class="block text-gray-600 font-medium mb-2">Nome do Lugar</label>
      <input
        type="text"
        id="nome"
        name="nome"
        class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
        placeholder="Ex: Praia do Sol, Restaurante Estrela"
        required
        formControlName="nome"
      />
      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('nome')">Campo Obrigatório</span>
    </div>

    <div class="mb-4">
      <label for="categoria" class="block text-gray-600 font-medium mb-2">Categoria</label>
      <select
        id="categoria"
        name="categoria"
        class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
        required
        formControlName="categoria"
      >
        <option value="">Selecione uma categoria</option>
        <option *ngFor="let categoria of categorias" [value]="categoria.id">
          {{ categoria.nome }}
        </option>
      </select>
      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('categoria')"
        >Campo Obrigatório</span
      >
    </div>

    <div class="mb-4">
      <label for="localizacao" class="block text-gray-600 font-medium mb-2">Localização</label>
      <input
        type="text"
        id="localizacao"
        name="localizacao"
        class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
        placeholder="Ex: São Paulo, Rio de Janeiro"
        required
        formControlName="localizacao"
      />
      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('localizacao')"
        >Campo Obrigatório</span
      >
    </div>

    <div class="mb-4">
      <label for="urlFoto" class="block text-gray-600 font-medium mb-2">URL Foto</label>
      <input
        type="text"
        id="urlFoto"
        name="urlFoto"
        class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
        placeholder="Ex: http://example.com/foto.jpg"
        required
        formControlName="urlFoto"
      />
      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('urlFoto')">Campo Obrigatório</span>
    </div>

    <div class="mb-4">
      <label for="avaliacao" class="block text-gray-600 font-medium mb-2">Avaliação</label>
      <input
        type="text"
        id="avaliacao"
        name="avaliacao"
        class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
        placeholder="Ex: 4.5"
        required
        formControlName="avaliacao"
      />
      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('avaliacao')"
        >Campo Obrigatório</span
      >
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded shadow"
    >
      Cadastrar Lugar
    </button>
  </form>
</div>
