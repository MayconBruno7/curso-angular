<div fxLayout="row" fxLayoutAlign="center">
    <div fxLayout="column" fxFlex="1000px">
        <form class="mt-60" #clientesFrm="ngForm" (ngSubmit)="salvar()">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Dados Pessoais</mat-card-title>
                </mat-card-header>
                <mat-card-content class="mt-20">
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field >
                                <mat-label>Nome: </mat-label>
                                <input 
                                    [(ngModel)]="cliente.nome" 
                                    matInput 
                                    name="nome" 
                                    required 
                                    placeholder="Exemplo: Jose">
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field fxFlex>
                                <mat-label>Email: </mat-label>
                                <input 
                                    [(ngModel)]="cliente.email" 
                                    matInput 
                                    name="email" 
                                    required 
                                    placeholder="Exemplo: jose@example.com">
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field fxFlex>
                                <mat-label>CPF: </mat-label>
                                <input 
                                    [(ngModel)]="cliente.cpf" 
                                    matInput 
                                    name="cpf" 
                                    ngModel 
                                    required 
                                    placeholder="Exemplo: 123.456.789-00">
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field fxFlex>
                                <mat-label>Data de nascimento: </mat-label>
                                <input 
                                    [(ngModel)]="cliente.dataNascimento" 
                                    matInput 
                                    name="dataNascimento" 
                                    ngModel 
                                    required 
                                    placeholder="Exemplo: 01/01/1990">
                            </mat-form-field>
                        </div>
                    </div>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-flat-button color="primary" type="submit">
                        <mat-icon>save</mat-icon>
                        Salvar
                    </button>
                    <button mat-flat-button color="primary">
                        <mat-icon>refresh</mat-icon>
                        Atualizar
                    </button>
                    <button mat-flat-button color="accent" class="ml-5">
                        <mat-icon>backspace</mat-icon>
                        Limpar
                    </button>
                </mat-card-actions>
            </mat-card>
        </form>

    </div>
</div>
