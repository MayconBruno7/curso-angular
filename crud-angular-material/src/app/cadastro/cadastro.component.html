<div fxLayout="row" fxLayoutAlign="center">
    <div fxLayout="column" fxFlex="1000px">
        <form class="mt-60" #clientesFrm="ngForm">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Dados Pessoais</mat-card-title>
                </mat-card-header>
                <mat-card-content class="mt-20">
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <mat-form-field fxFlex>
                            <mat-label>Nome: </mat-label>
                            <input matInput name="nome" ngModel required placeholder="Exemplo: Jose">
                        </mat-form-field>
                        <mat-form-field fxFlex>
                            <mat-label>Sobrenome: </mat-label>
                            <input matInput name="sobrenome" ngModel required placeholder="Exemplo: da Silva">
                        </mat-form-field>

                    </div>

                </mat-card-content>

            </mat-card>
        </form>

    </div>
</div>
